apiVersion: kiali.io/v1alpha1
kind: Kiali
metadata:
  name: kiali
  namespace: istio-system
spec:
  auth:
    strategy: openshift
  deployment:
    accessible_namespaces:
    - '**'
    cluster_wide_access: true
    custom_secrets:
    - mount: /kiali-trace-cert
      name: cacert
      optional: false
    logger:
      log_level: info
    namespace: istio-system
    pod_labels:
      sidecar.istio.io/inject: "false"
    view_only_mode: false
  external_services:
    grafana:
      enabled: false
    prometheus:
      auth:
        type: bearer
        use_kiali_token: true
      query_scope:
        mesh_id: ossm-3
      thanos_proxy:
        enabled: true
      url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
    tracing:
      auth:
        ca_file: /kiali-trace-cert/ca.crt
        insecure_skip_verify: false
        type: bearer
        use_kiali_token: true
      enabled: true
      external_url: https://tempo-sample-gateway-tracing-system.apps.ocp4.example.com/api/traces/v1/north/search
      health_check_url: https://tempo-sample-gateway-tracing-system.apps.ocp4.example.com/api/traces/v1/north/tempo/api/echo
      internal_url: https://tempo-sample-gateway.tracing-system.svc.cluster.local:8080/api/traces/v1/north/tempo
      provider: tempo
      query_timeout: 60
      tempo_config:
        url_format: jaeger
      use_grpc: false
  installation_tag: Kiali [istio-system]
  istio_namespace: istio-system
  server:
    write_timeout: 60
